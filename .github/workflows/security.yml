name: security

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container: semgrep/semgrep:1.166.0
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: scan
        run: semgrep scan --config p/golang --config p/gosec .

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: scan
        uses: golang/govulncheck-action@v1.0.4
        with:
          go-version-file: go.mod

  zap:
    name: zap
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: start application
        run: |
          cp .env.example .env
          docker compose up -d --wait
          go run ./cmd > app.log 2>&1 &
          timeout 30s bash -c 'until curl -fsS http://127.0.0.1:8080/healthz; do sleep 1; done'

      - name: scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://127.0.0.1:8080/healthz
          rules_file_name: .zap/rules.tsv
          fail_action: false
          allow_issue_writing: false
